# 提交前自动检查：格式/lint + 防泄密钥 + 防误传大文件
# 安装：pip install pre-commit && pre-commit install
# 手动全量跑：pre-commit run --all-files
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff               # lint（自动修可修项）
        args: [--fix]
      - id: ruff-format        # 代码格式化

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: detect-private-key            # 防止提交私钥/密钥
      - id: check-added-large-files       # 防止误传大权重文件
        args: [--maxkb=11000]             # 允许 spaces 的 ~10MB 预算 embedding，拦截更大文件
