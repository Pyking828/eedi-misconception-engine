# ============================================================
# Eedi Misconception Engine — Base Configuration
# ============================================================

project:
  name: eedi-misconception-engine
  version: "0.1.0"
  seed: 42

paths:
  root: /root/autodl-tmp/eedi-misconception-engine
  data: /root/autodl-tmp/eedi-data
  models: /root/autodl-tmp/models
  hf_cache: /root/autodl-tmp/hf_cache
  outputs: /root/autodl-tmp/eedi-misconception-engine/outputs
  logs: /root/autodl-tmp/eedi-misconception-engine/logs

hardware:
  gpu_memory_gb: 96
  max_gpu_utilization: 0.92   # 护栏：安全前提下尽量吃满GPU；逼近92GB自动降batch/降并发
  device: cuda
  dtype: bfloat16
  num_workers: 8

data:
  train_csv: /root/autodl-tmp/eedi-data/train.csv
  misconception_csv: /root/autodl-tmp/eedi-data/misconception_mapping.csv
  test_csv: /root/autodl-tmp/eedi-data/test.csv
  folds_path: /root/autodl-tmp/eedi-data/folds.parquet
  n_folds: 5
  eval_fold: 0

retriever:
  # Final 30B以内主线：8B 召回；0.6B 保留为 quick baseline / HF Spaces demo
  model_name: Qwen/Qwen3-Embedding-8B
  baseline_model: Qwen/Qwen3-Embedding-0.6B
  backup_model: Qwen/Qwen3-Embedding-4B
  faiss_index_path: /root/autodl-tmp/eedi-data/faiss_index.bin
  embed_dim: 4096
  top_k_retrieve: 50          # 召回候选数
  max_seq_len: 512
  batch_size: 64
  # LoRA 微调参数
  lora:
    r: 16
    lora_alpha: 32
    lora_dropout: 0.05
    target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]
  # 训练参数
  train:
    num_epochs: 3
    learning_rate: 2.0e-4
    per_device_train_batch_size: 8
    gradient_accumulation_steps: 4
    warmup_ratio: 0.05
    loss: infonce             # infonce | mnrl
    temperature: 0.02
    hard_neg_per_pos: 8

reranker:
  pointwise:
    # Final 30B以内主线：8B reranker；0.6B 保留为快速 baseline
    model_name: Qwen/Qwen3-Reranker-8B
    baseline_model: Qwen/Qwen3-Reranker-0.6B
    backup_model: Qwen/Qwen3-Reranker-4B
    top_k_input: 50
    top_k_output: 10
    max_seq_len: 1024
    lora:
      r: 16
      lora_alpha: 32
    train:
      num_epochs: 3
      learning_rate: 1.0e-4
      per_device_train_batch_size: 4
  listwise:
    model_name: deepseek-ai/DeepSeek-R1-Distill-Qwen-14B
    top_k_input: 10
    top_k_output: 5
    max_new_tokens: 64
    lora:
      r: 32
      lora_alpha: 64
    train:
      num_epochs: 2
      learning_rate: 5.0e-5
      per_device_train_batch_size: 2
      gradient_accumulation_steps: 8

reasoner:
  model_name: deepseek-ai/DeepSeek-R1-Distill-Qwen-14B
  max_new_tokens: 256
  temperature: 0.1
  use_cache: true
  cache_db: /root/autodl-tmp/eedi-data/reasoner_cache.db

synth:
  # 主线上线模型仍为 14B；32B 只做离线 teacher / judge / distillation，不进入线上服务。
  teacher_model: deepseek-ai/DeepSeek-R1-Distill-Qwen-32B
  student_reasoner_model: deepseek-ai/DeepSeek-R1-Distill-Qwen-14B
  judge_model: deepseek-ai/DeepSeek-R1-Distill-Qwen-32B
  vllm_gpu_memory_utilization: 0.90
  max_parallel_generation: 8
  num_synth_per_misconception: 5   # 每条错因生成5道题
  judge_threshold: 6               # LLM-as-judge 0-10 分，≥6 保留

grpo:
  model_name: deepseek-ai/DeepSeek-R1-Distill-Qwen-14B
  lora:
    r: 32
    lora_alpha: 64
  train:
    num_episodes: 500
    learning_rate: 1.0e-5
    per_device_train_batch_size: 2
    gradient_accumulation_steps: 8
    reward: ndcg_gain           # ndcg_gain | top1_hit

router:
  subject_classifier: keyword    # keyword | embedding
  cost_threshold: 0.7           # 召回置信度低于此值才升级到重排
  enable_memory: true

memory:
  db_path: /root/autodl-tmp/eedi-data/memory.db
  cache_ttl_hours: 24

service:
  host: 0.0.0.0
  port: 6006
  workers: 1
  log_level: info

eval:
  metrics: [map_at_25, recall_at_25, recall_at_10, ndcg_at_25]
  report_path: /root/autodl-tmp/eedi-misconception-engine/outputs/eval_report.json
